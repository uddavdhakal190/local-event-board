name: EventGO CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies for vulnerabilities
      run: npm audit --audit-level=high

    - name: Build project
      run: npm run build

    - name: Run smoke tests
      run: node scripts/qa-api-smoke.mjs
